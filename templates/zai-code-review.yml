# Z.ai Code Review — GitLab CI template.
#
# Usage in a downstream project's .gitlab-ci.yml:
#
#   include:
#     - project: 'your-group/zai-gitlab'
#       file: '/templates/zai-code-review.yml'
#       ref: main
#
# Then set masked CI/CD variables: ZAI_API_KEY and GITLAB_TOKEN.
# Requirements:
#   - Merge request pipelines enabled.
#   - GITLAB_TOKEN = Project/Group Access Token or PAT with `api` scope, role >= Developer.
#     CI_JOB_TOKEN does NOT work — it cannot post MR notes via the API.

zai-code-review:
  image: registry.gitlab.com/your-group/zai-gitlab:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    # Override any of these in the consuming project as needed.
    ZAI_MODEL: "glm-4.7"
    ZAI_REVIEWER_NAME: "Z.ai Code Review"
    EXCLUDE_PATTERNS: "*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"
    MAX_DIFF_CHARS: "0"
  script:
    - node /app/src/index.js
