# Z.ai Code Review — GitLab CI template.
#
# The repo is hosted on GitHub, so consumers include it via a remote raw URL
# (GitLab `include: project:` only works for GitLab-hosted repos). In the
# downstream project's .gitlab-ci.yml:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/xdimedrolx/zai-gitlab-review/main/templates/zai-code-review.yml'
#
# Then set masked CI/CD variables: ZAI_API_KEY and GITLAB_TOKEN.
# Requirements:
#   - Merge request pipelines enabled.
#   - GITLAB_TOKEN = Project/Group Access Token or PAT with `api` scope, role >= Developer.
#     CI_JOB_TOKEN does NOT work — it cannot post MR notes via the API.
#   - The GHCR image below must be public (or add a docker login step for GHCR).

zai-code-review:
  image: ghcr.io/xdimedrolx/zai-gitlab-review:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    # Override any of these in the consuming project as needed.
    ZAI_MODEL: "glm-5.2"
    ZAI_REVIEWER_NAME: "Z.ai Code Review"
    EXCLUDE_PATTERNS: "*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"
    MAX_DIFF_CHARS: "0"
  script:
    - node /app/src/index.js
